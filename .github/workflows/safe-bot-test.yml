name: Safe Bot Test Run

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Run duration in minutes (15-180)"
        required: true
        default: "60"
      max_file_size_mb:
        description: "Max accepted file size in MB (128-2048)"
        required: true
        default: "2048"

permissions:
  contents: read

concurrency:
  group: safe-bot-test
  cancel-in-progress: true

jobs:
  run-safe-test:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secrets and input
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          INPUT_DURATION: ${{ github.event.inputs.duration_minutes }}
          INPUT_MAX_FILE_SIZE: ${{ github.event.inputs.max_file_size_mb }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$API_ID" ] || [ -z "$API_HASH" ]; then
            echo "Missing required secrets. Add BOT_TOKEN, API_ID, API_HASH in repository secrets."
            exit 1
          fi

          case "$INPUT_DURATION" in
            ''|*[!0-9]*)
              echo "duration_minutes must be a number."
              exit 1
              ;;
          esac

          DURATION=$INPUT_DURATION
          if [ "$DURATION" -lt 15 ]; then DURATION=15; fi
          if [ "$DURATION" -gt 180 ]; then DURATION=180; fi

          case "$INPUT_MAX_FILE_SIZE" in
            ''|*[!0-9]*)
              echo "max_file_size_mb must be a number."
              exit 1
              ;;
          esac

          MAX_FILE_SIZE=$INPUT_MAX_FILE_SIZE
          if [ "$MAX_FILE_SIZE" -lt 128 ]; then MAX_FILE_SIZE=128; fi
          if [ "$MAX_FILE_SIZE" -gt 2048 ]; then MAX_FILE_SIZE=2048; fi

          echo "SAFE_DURATION_MINUTES=$DURATION" >> "$GITHUB_ENV"
          echo "SAFE_MAX_FILE_SIZE_MB=$MAX_FILE_SIZE" >> "$GITHUB_ENV"
          echo "SAFE_PUBLIC_BASE_URL=$PUBLIC_BASE_URL" >> "$GITHUB_ENV"

      - name: Setup public URL (secret or temporary tunnel)
        env:
          SAFE_PUBLIC_BASE_URL: ${{ env.SAFE_PUBLIC_BASE_URL }}
        run: |
          if [ -n "$SAFE_PUBLIC_BASE_URL" ]; then
            echo "Using PUBLIC_BASE_URL from secret: $SAFE_PUBLIC_BASE_URL"
            exit 0
          fi

          echo "PUBLIC_BASE_URL not provided. Starting temporary Cloudflare tunnel..."
          curl -L "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

          nohup cloudflared tunnel --url http://127.0.0.1:8080 --no-autoupdate > tunnel.log 2>&1 &
          echo "TUNNEL_PID=$!" >> "$GITHUB_ENV"

          URL=""
          for i in $(seq 1 30); do
            URL=$(sed -n 's/.*\(https:\/\/[-a-z0-9]*\.trycloudflare\.com\).*/\1/p' tunnel.log | head -n 1)
            if [ -n "$URL" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$URL" ]; then
            echo "Could not create temporary tunnel URL."
            echo "Tunnel log:"
            cat tunnel.log
            exit 1
          fi

          echo "Temporary public URL: $URL"
          echo "SAFE_PUBLIC_BASE_URL=$URL" >> "$GITHUB_ENV"

      - name: Write runtime env
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          LINK_SIGNING_SECRET: ${{ secrets.LINK_SIGNING_SECRET }}
          SAFE_PUBLIC_BASE_URL: ${{ env.SAFE_PUBLIC_BASE_URL }}
          SAFE_MAX_FILE_SIZE_MB: ${{ env.SAFE_MAX_FILE_SIZE_MB }}
        run: |
          {
            echo "BOT_TOKEN=$BOT_TOKEN"
            echo "API_ID=$API_ID"
            echo "API_HASH=$API_HASH"
            echo "PUBLIC_BASE_URL=$SAFE_PUBLIC_BASE_URL"
            echo "PORT=8080"
            echo "SERVER_HOST=127.0.0.1"
            echo "ADMIN_IDS=$ADMIN_IDS"
            echo "LINK_SIGNING_SECRET=$LINK_SIGNING_SECRET"
            echo "LINK_EXPIRY_SECONDS=3600"
            echo "RATE_LIMIT_REQUESTS=8"
            echo "RATE_LIMIT_WINDOW_SECONDS=60"
            echo "MAX_FILE_SIZE_MB=$SAFE_MAX_FILE_SIZE_MB"
            echo "LOG_LEVEL=INFO"
            echo "FFMPEG_ENABLED=false"
            echo "DATABASE_PATH=data/bot.db"
            echo "STORAGE_PATH=storage/files"
            echo "HLS_PATH=storage/hls"
            echo "PYROGRAM_WORKDIR=.pyrogram"
          } > .env

      - name: Start bot
        run: |
          nohup python -m bot.main > bot.log 2>&1 &
          echo "BOT_PID=$!" >> "$GITHUB_ENV"
          sleep 15
          curl -fsS http://127.0.0.1:8080/health

      - name: Keep bot alive for selected duration
        env:
          SAFE_DURATION_MINUTES: ${{ env.SAFE_DURATION_MINUTES }}
        run: |
          echo "Running safe test for $SAFE_DURATION_MINUTES minute(s)..."
          i=0
          while [ "$i" -lt "$SAFE_DURATION_MINUTES" ]; do
            sleep 60
            curl -fsS http://127.0.0.1:8080/health > /dev/null
            i=$((i + 1))
          done
          echo "Safe run completed."

      - name: Stop bot
        if: always()
        run: |
          if [ -n "$BOT_PID" ] && kill -0 "$BOT_PID" 2>/dev/null; then
            kill "$BOT_PID" || true
            sleep 2
          fi
          if [ -n "$TUNNEL_PID" ] && kill -0 "$TUNNEL_PID" 2>/dev/null; then
            kill "$TUNNEL_PID" || true
            sleep 2
          fi

      - name: Upload bot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safe-bot-test-logs
          path: bot.log
          if-no-files-found: warn

      - name: Upload tunnel logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safe-bot-test-tunnel-logs
          path: tunnel.log
          if-no-files-found: ignore
